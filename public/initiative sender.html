<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initiative Sender</title>
    <link rel="stylesheet" href="./style/styles.css">
</head>

<body>
    <div class="container">
        <h1>Initiative Tracker</h1>
        <form id="initiativeForm">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="initiative">Initiative:</label>
                <input type="number" id="initiative" name="initiative" required>
            </div>
            <div class="form-group">
                <label for="health">Health:</label>
                <input type="number" id="health" name="health" min="0">
            </div>
            <div class="form-group">
                <label for="maxHealth">Max Health:</label>
                <input type="number" id="maxHealth" name="maxHealth" min="0">
            </div>
            <button type="submit">Submit</button>
        </form>
    </div>

    <div id="initiatives">
    </div>

    <script type="module" src="./scripts/client/initiative sender.js"></script>
</body>

</html>
