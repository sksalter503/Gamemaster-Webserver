<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initiative Sender</title>
    <link rel="stylesheet" href="./style/styles.css">
</head>

<body>
    <div class="container">
        <h1>Initiative Tracker</h1>
        <button id="logoutButton" style="display: none;">Logout</button>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem;">
            <form id="initiativeForm" style="display: none;">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="initiative">Initiative:</label>
                    <input type="number" id="initiative" name="initiative" required>
                </div>
                <div class="form-group">
                    <label for="health">Health:</label>
                    <input type="number" id="health" name="health" min="0">
                </div>
                <div class="form-group">
                    <label for="maxHealth">Max Health:</label>
                    <input type="number" id="maxHealth" name="maxHealth" min="0">
                </div>
                <button type="submit">Submit</button>
            </form>
            <form style="display: none;" id="loginForm">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required>
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                    <button type="submit">Login</button>
                </div>
            </form>
            <div id="initiatives">
            </div>
        </div>
    </div>

    <script type="module" src="./initiative-sender.ts"></script>
    <script type="module" src="./login.ts"></script>
</body>

</html>
