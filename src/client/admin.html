<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin panel</title>
    <link rel="stylesheet" href="./style/styles.css">
</head>

<body>
    <div class="container">
        <h1>Admin Panel</h1>
        <button id="logoutButton" style="display: none;">Logout</button>
        <button id="clearInitiativesBtn">Clear Initiatives</button>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem;">
            <button id="startCombat">Start Combat</button>
            <button id="nextTurn">Next Turn</button>
            <button id="endCombat">End Combat</button>
        </div>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem;">
            <form id="initiativeForm" style="display: none;">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="initiative">Initiative:</label>
                    <input type="number" id="initiative" name="initiative" required>
                </div>
                <div class="form-group">
                    <label for="health">Health:</label>
                    <input type="number" id="health" name="health" min="0">
                </div>
                <div class="form-group">
                    <label for="maxHealth">Max Health:</label>
                    <input type="number" id="maxHealth" name="maxHealth" min="0">
                </div>
                <div>
                    <input type="checkbox" id="hideHealthValue" name="hideHealthValue">
                    <label for="hideHealthValue">Hide Health Value</label>
                </div>
                <div>
                    <input type="checkbox" id="hideHealthBar" name="hideHealthBar">
                    <label for="hideHealthBar">Hide Health Bar</label>
                </div>
                <button type="submit">Submit</button>
            </form>
            <form style="display: none;" id="loginForm">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required>
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                    <button type="submit">Login</button>
                </div>
            </form>
            <div id="initiatives">
                <ul style="list-style-type: none;" id="initiatives">

                </ul>
            </div>
        </div>
    </div>
    <footer>
        <p style="text-align: left; margin-top: 2rem; position:relative; bottom:0; left:0;"><a href="../">Back to the
                Directory</a></p>
    </footer>

    <script type="module" src="./admin.ts"></script>
    <script type="module" src="./login.ts"></script>

</body>

</html>
