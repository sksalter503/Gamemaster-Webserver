<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin panel</title>
    <link rel="stylesheet" href="../public/style/styles.css">
</head>

<body>
    <div class="container">
        <h1>Admin Panel</h1>
        <button id="clearInitiativesBtn">Clear Initiatives</button>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr;">
            <button id="startCombat">Start Combat</button>
            <button id="nextTurn">Next Turn</button>
            <button id="endCombat">End Combat</button>
        </div>
        <div class="initiatives">
            <ul style="list-style-type: none;" id="initiatives">

            </ul>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:80/initiative';
        let currentTurnIndex = 0;
        document.getElementById('clearInitiativesBtn').addEventListener('click', async () => {
            try {
                await fetch(API_URL, {
                    method: 'DELETE',
                });
                fetchInitiatives();
            } catch (error) {
                console.error('Error clearing initiatives:', error);
            }
        });
        document.getElementById('startCombat').addEventListener('click', async () => {
            currentTurnIndex = 0;
            try {
                await fetch(`${API_URL}/start`);
            } catch (error) {
                console.error('Error starting combat:', error);
            }
        });
        document.getElementById('nextTurn').addEventListener('click', async () => {
            try {
                await fetch(`${API_URL}/next`);
            } catch (error) {
                console.error('Error advancing turn:', error);
            }
        });
        document.getElementById('endCombat').addEventListener('click', async () => {
            try {
                await fetch(`${API_URL}/end`);
            } catch (error) {
                console.error('Error ending combat:', error);
            }
        });

        async function fetchInitiatives() {
            try {
                const response = await fetch(API_URL);
                const JSON = await response.json();
                const initiatives = JSON.initiatives;
                const currentTurnIndex = JSON.currentTurnIndex;
                const combatStarted = JSON.combatStarted;

                const initiativesDiv = document.querySelector('.initiatives');
                initiativesDiv.innerHTML = '';

                if (initiatives.length > 0) {
                    initiativesDiv.innerHTML = '<h3>Current turn order:</h3>';
                    const list = document.createElement('ul');
                    list.style.listStyleType = 'none';
                    initiatives.forEach(init => {
                        const listItem = document.createElement('li');
                        const deleteBtn = document.createElement('button');
                        deleteBtn.textContent = 'Delete';
                        deleteBtn.addEventListener('click', async () => {
                            try {
                                await fetch(`${API_URL}/${initiatives.indexOf(init)}`, {
                                    method: 'DELETE'
                                });
                                fetchInitiatives();
                            } catch (error) {
                                console.error('Error deleting initiative:', error);
                            }
                        });
                        listItem.textContent = `${init.name}: ${init.initiative}`;
                        listItem.appendChild(deleteBtn);
                        list.appendChild(listItem);
                    });
                    initiativesDiv.appendChild(list);
                    if (combatStarted) {
                        const listItems = list.querySelectorAll('li');
                        listItems[currentTurnIndex].style.backgroundColor = 'white';
                        listItems[currentTurnIndex].style.color = 'black';
                    }
                }
            } catch (error) {
                console.error('Error fetching initiatives:', error);
            }
        }

        setInterval(fetchInitiatives, 1000);

    </script>
</body>

</html>
